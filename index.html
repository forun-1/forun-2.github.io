<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情绪瓶 · 另一个世界</title>
  <style>
    :root {
      --bg-1: #fffaf3;
      --bg-2: #f7fbff;
      --text: #3b4050;
      --muted: #798195;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(120, 138, 170, 0.16);
      --shadow: 0 22px 60px rgba(110, 124, 153, 0.16);
      --accent: #82c8bb;
      --accent-soft: #dff4ee;
      --title: #42506b;
      --glass-1: #bfe9e5;
      --glass-2: #e6f8f5;
      --ring: rgba(130, 200, 187, 0.22);
      --page-glow-1: rgba(255, 211, 231, 0.35);
      --page-glow-2: rgba(197, 240, 228, 0.4);
      --page-glow-3: rgba(202, 224, 255, 0.24);
      --editor-bg: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
      --chip-bg: rgba(255,255,255,0.7);
      --chip-text: #5c6680;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 16%, var(--page-glow-1), transparent 28%),
        radial-gradient(circle at 88% 20%, var(--page-glow-2), transparent 24%),
        radial-gradient(circle at 50% 84%, var(--page-glow-3), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      transition: background 0.65s ease, color 0.35s ease;
      overflow-x: hidden;
    }

    body.theme-joy {
      --bg-1: #fff7ef;
      --bg-2: #f7fffb;
      --text: #4e4f63;
      --muted: #7f7789;
      --accent: #ffb9ce;
      --accent-soft: #ffe8ef;
      --title: #f085ab;
      --glass-1: #ffd8b6;
      --glass-2: #fff1cf;
      --ring: rgba(255, 185, 206, 0.25);
      --page-glow-1: rgba(255, 204, 219, 0.48);
      --page-glow-2: rgba(196, 243, 226, 0.42);
      --page-glow-3: rgba(255, 235, 180, 0.28);
      --chip-bg: rgba(255, 247, 250, 0.82);
      --chip-text: #cf7594;
    }

    body.theme-rainy {
      --bg-1: #d7dbe4;
      --bg-2: #b7becd;
      --text: #283141;
      --muted: #566276;
      --panel: rgba(255, 255, 255, 0.55);
      --panel-strong: rgba(243, 246, 251, 0.78);
      --accent: #7b8ba6;
      --accent-soft: rgba(182, 194, 217, 0.35);
      --title: #4c5f7c;
      --glass-1: #aeb6c8;
      --glass-2: #dce2ee;
      --ring: rgba(123, 139, 166, 0.22);
      --page-glow-1: rgba(130, 139, 157, 0.22);
      --page-glow-2: rgba(205, 212, 224, 0.24);
      --page-glow-3: rgba(102, 112, 134, 0.18);
      --editor-bg: linear-gradient(180deg, rgba(242,245,250,0.86), rgba(227,232,240,0.72));
      --chip-bg: rgba(236, 239, 246, 0.74);
      --chip-text: #5f6e89;
    }

    body.theme-ideas {
      --bg-1: #fcf7ff;
      --bg-2: #f5fbff;
      --text: #403d59;
      --muted: #6f6a87;
      --accent: #b59df2;
      --accent-soft: #efe8ff;
      --title: #8971da;
      --glass-1: #d9c8ff;
      --glass-2: #d8f3ff;
      --ring: rgba(181, 157, 242, 0.24);
      --page-glow-1: rgba(218, 195, 255, 0.42);
      --page-glow-2: rgba(197, 246, 255, 0.36);
      --page-glow-3: rgba(255, 222, 252, 0.24);
      --chip-bg: rgba(249, 246, 255, 0.82);
      --chip-text: #8c72db;
    }

    body.theme-ordinary {
      --bg-1: #faf7f2;
      --bg-2: #f4fbf6;
      --text: #4a4f4a;
      --muted: #6e7a6d;
      --accent: #9dc6a3;
      --accent-soft: #ebf5e8;
      --title: #6f9675;
      --glass-1: #d6e3c8;
      --glass-2: #f7efd9;
      --ring: rgba(157, 198, 163, 0.22);
      --page-glow-1: rgba(232, 217, 197, 0.28);
      --page-glow-2: rgba(208, 236, 213, 0.34);
      --page-glow-3: rgba(240, 232, 213, 0.22);
      --chip-bg: rgba(250, 249, 244, 0.84);
      --chip-text: #6a8e6e;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 24% 30%, rgba(255,255,255,0.55) 0, rgba(255,255,255,0.18) 22%, transparent 46%),
        radial-gradient(circle at 76% 28%, rgba(255,255,255,0.4) 0, rgba(255,255,255,0.12) 18%, transparent 42%);
      opacity: 0.75;
      transition: opacity .5s ease;
    }

    body.scene-rainy::before { opacity: .95; }
    body.scene-joy::before { opacity: .88; }
    body.scene-ideas::before { opacity: .84; }
    body.scene-ordinary::before { opacity: .82; }

    .page {
      max-width: 1420px;
      margin: 0 auto;
      padding: 28px 18px 34px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      position: relative;
      z-index: 2;
    }

    .title-box h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      letter-spacing: 2px;
      color: var(--title);
      font-weight: 800;
    }

    .title-box p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .world-tag {
      min-width: 170px;
      border-radius: 20px;
      padding: 14px 16px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
      color: var(--title);
      backdrop-filter: blur(14px);
      transition: transform .45s ease, box-shadow .45s ease;
    }

    .world-tag strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .world-tag span {
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 24px;
      align-items: start;
      position: relative;
      z-index: 2;
      transition: transform .85s cubic-bezier(.2,.8,.2,1), filter .8s ease;
    }

    .glass-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition: transform .55s ease, background .45s ease, box-shadow .55s ease, border-color .35s ease;
      position: relative;
      overflow: hidden;
    }

    .wheel-panel {
      min-height: 780px;
      padding: 26px;
    }

    .wheel-panel::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.4), rgba(255,255,255,0.1) 46%, transparent 68%);
      pointer-events: none;
      transition: transform .9s ease, opacity .9s ease;
    }

    body.scene-joy .wheel-panel::after {
      transform: translate(-50%, -50%) scale(1.05);
      opacity: .95;
    }

    body.scene-rainy .wheel-panel::after {
      transform: translate(-50%, -50%) scale(0.98);
      opacity: .72;
    }

    body.scene-ideas .wheel-panel::after {
      transform: translate(-50%, -50%) scale(1.08) rotate(8deg);
      opacity: .9;
    }

    body.scene-ordinary .wheel-panel::after {
      transform: translate(-50%, -50%) scale(1.02);
      opacity: .84;
    }

    .wheel-center {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.68));
      box-shadow: inset 0 0 0 14px var(--ring), 0 18px 38px rgba(116, 127, 152, 0.12);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      z-index: 1;
      transition: transform .8s cubic-bezier(.2,.8,.2,1), box-shadow .8s ease;
    }

    .wheel-center strong {
      display: block;
      font-size: 30px;
      color: var(--title);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .wheel-center span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    body.scene-joy .wheel-center { animation: centerGlow 2.9s ease; }
    body.scene-rainy .wheel-center { animation: centerRain 3.2s ease; }
    body.scene-ideas .wheel-center { animation: centerOrbit 2.7s ease; }
    body.scene-ordinary .wheel-center { animation: centerBreath 2.8s ease; }

    .wheel {
      position: relative;
      height: 728px;
      transition: transform .9s cubic-bezier(.2,.8,.2,1), filter .8s ease;
    }

    .bottle-card {
      position: absolute;
      width: 240px;
      height: 280px;
      transform-origin: center center;
      transition:
        transform 0.65s cubic-bezier(.2,.9,.2,1),
        opacity 0.45s ease,
        filter 0.45s ease,
        box-shadow 0.45s ease;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      will-change: transform;
    }

    .bottle-card[data-pos="top-left"] { left: 52px; top: 66px; }
    .bottle-card[data-pos="top-right"] { right: 52px; top: 66px; }
    .bottle-card[data-pos="bottom-left"] { left: 52px; bottom: 42px; }
    .bottle-card[data-pos="bottom-right"] { right: 52px; bottom: 42px; }

    .bottle-card.dimmed {
      transform: scale(0.84);
      opacity: 0.66;
      filter: saturate(0.86) blur(.2px);
    }

    .bottle-card.active {
      transform: scale(1.16) translateY(-8px);
      z-index: 3;
      opacity: 1;
      filter: saturate(1.04);
    }

    .bottle-card:hover:not(.active) { transform: scale(1.03) translateY(-4px); }
    .bottle-card.clicked { animation: bottlePulse .95s cubic-bezier(.2,.9,.2,1); }
    .bottle-card.active .bottle-body { box-shadow:
      inset -14px -18px 28px rgba(255,255,255,0.22),
      inset 16px 18px 26px rgba(255,255,255,0.32),
      0 26px 48px rgba(120, 136, 162, 0.23);
    }

    .bottle {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 24px;
      color: var(--text);
    }

    .bottle-neck {
      width: 72px;
      height: 48px;
      border-radius: 24px 24px 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.56));
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.28);
      position: absolute;
      top: 24px;
      z-index: 2;
      transition: transform .6s ease;
    }

    .bottle-body {
      width: 220px;
      height: 220px;
      border-radius: 48% 48% 42% 42% / 40% 40% 58% 58%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.48) 18%, rgba(255,255,255,0.24) 100%),
        linear-gradient(180deg, var(--glass-1), var(--glass-2));
      border: 1px solid rgba(255,255,255,0.56);
      box-shadow:
        inset -14px -18px 28px rgba(255,255,255,0.22),
        inset 16px 18px 26px rgba(255,255,255,0.32),
        0 24px 40px rgba(120, 136, 162, 0.18);
      position: relative;
      overflow: hidden;
      padding: 92px 18px 22px;
      text-align: center;
      backdrop-filter: blur(3px);
      transition: transform .65s ease, filter .65s ease, box-shadow .65s ease;
    }

    .bottle-body::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 30px;
      width: 48px;
      height: 126px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.08));
      filter: blur(0.4px);
      opacity: 0.85;
    }

    .bottle-body::after {
      content: "";
      position: absolute;
      inset: auto 18px 18px 18px;
      height: 54%;
      border-radius: 36px 36px 64px 64px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.15));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28);
      opacity: 0.72;
    }

    .bottle-card[data-id="joy"] .bottle-name {
      font-family: "STKaiti", "KaiTi", "DFKai-SB", cursive;
      letter-spacing: 1px;
    }
    .bottle-card[data-id="rainy"] .bottle-name {
      font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
      letter-spacing: 2px;
    }
    .bottle-card[data-id="ideas"] .bottle-name {
      font-family: "STXinwei", "FZShuTi", "YouYuan", cursive;
      letter-spacing: 2px;
    }
    .bottle-card[data-id="ordinary"] .bottle-name {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 1px;
    }

    .bottle-bubbles,
    .bottle-stars,
    .bottle-rain,
    .bottle-grains {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.7;
    }

    .bottle-bubbles i,
    .bottle-stars i,
    .bottle-rain i,
    .bottle-grains i {
      position: absolute;
      display: block;
    }

    .bottle-bubbles i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.58);
      animation: floatUp 4.2s linear infinite;
    }

    .bottle-rain i {
      width: 2px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      animation: rainFall 2.4s linear infinite;
    }

    .bottle-stars i {
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.9);
      clip-path: polygon(50% 0%, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0% 50%, 38% 36%);
      animation: twinkle 2.8s ease-in-out infinite;
    }

    .bottle-grains i {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.42);
      animation: breathe 3.6s ease-in-out infinite;
    }

    .bottle-name {
      position: relative;
      z-index: 1;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #ffffff;
      text-shadow: 0 4px 14px rgba(77, 90, 117, 0.18);
    }

    .bottle-line {
      position: relative;
      z-index: 1;
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255,255,255,0.94);
      max-width: 152px;
      margin: 0 auto;
    }

    .label-chip {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.96);
      font-size: 12px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(8px);
    }

    .editor-panel {
      min-height: 780px;
      padding: 22px;
      background: var(--editor-bg);
    }

    .editor-shell {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      height: 100%;
      position: relative;
      z-index: 2;
    }

    .editor-panel.refreshing .editor-header,
    .editor-panel.refreshing .composer,
    .editor-panel.refreshing .timeline {
      animation: panelFade .7s ease;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .editor-title h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 38px);
      color: var(--title);
      transition: letter-spacing .55s ease, transform .55s ease;
    }

    .editor-title p {
      margin: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.9;
      max-width: 620px;
    }

    .status-box {
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      min-width: 220px;
      box-shadow: 0 14px 32px rgba(120, 132, 156, 0.08);
      transition: transform .6s ease;
    }

    .status-box strong {
      display: block;
      color: var(--title);
      margin-bottom: 6px;
      font-size: 14px;
    }

    .status-box div {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .composer {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: 0 16px 34px rgba(120, 132, 156, 0.08);
      padding: 16px;
    }

    .composer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .composer-head strong {
      color: var(--title);
      font-size: 16px;
    }

    .time-chip {
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--chip-bg);
      color: var(--chip-text);
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.56);
    }

    textarea.main-input,
    textarea.reply-input {
      width: 100%;
      border: 1px solid rgba(129, 144, 170, 0.18);
      outline: none;
      border-radius: 20px;
      padding: 16px 18px;
      font-size: 15px;
      line-height: 1.9;
      background: rgba(255,255,255,0.88);
      color: var(--text);
      resize: vertical;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform .25s ease;
    }

    textarea.main-input { min-height: 142px; }
    textarea.reply-input { min-height: 88px; margin-top: 10px; }

    textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 68%, white 32%);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
      transform: translateY(-1px);
    }

    .composer-actions,
    .reply-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tips {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 10px 15px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease, filter .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
      box-shadow: 0 12px 22px rgba(112, 124, 149, 0.12);
      filter: saturate(1.05);
    }

    .btn.primary {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 78%, white 22%), color-mix(in srgb, var(--accent) 56%, #ffffff 44%));
      color: white;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.78);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .timeline {
      padding-right: 4px;
      overflow: auto;
      position: relative;
    }

    .timeline-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .timeline-head h3 {
      margin: 0;
      font-size: 19px;
      color: var(--title);
    }

    .count-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--chip-text);
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.56);
    }

    .empty-state {
      border: 1px dashed rgba(129, 144, 170, 0.24);
      border-radius: 24px;
      background: rgba(255,255,255,0.44);
      padding: 32px 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.9;
    }

    .note-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 16px 32px rgba(118, 128, 153, 0.08);
      transform: translateY(0);
      transition: transform .25s ease, box-shadow .25s ease, background .35s ease;
    }

    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(118, 128, 153, 0.11);
    }

    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .note-time {
      color: var(--chip-text);
      font-size: 12px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--chip-bg);
      border: 1px solid rgba(255,255,255,0.56);
    }

    .note-content {
      color: var(--text);
      line-height: 1.95;

      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const sec = String(d.getSeconds()).padStart(2, '0');
      return `${y}-${m}-${day} ${h}:${min}:${sec}`;
    }

    function getBottleConfig(id) {
      return bottleConfigs.find(item => item.id === id);
    }

    function currentBottleCollection() {
      if (!currentUser) return null;
      return collection(db, `users/${currentUser.uid}/bottles/${activeBottleId}/posts`);
    }

    function setTheme(id) {
      const config = getBottleConfig(id);
      document.body.className = config.className;
    }

    function createDeco(type) {
      const wrapper = document.createElement('div');
      wrapper.className = `bottle-${type}`;
      const count = type === 'rain' ? 8 : 7;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('i');
        el.style.left = `${12 + Math.random() * 72}%`;
        el.style.top = `${14 + Math.random() * 66}%`;
        el.style.animationDelay = `${Math.random() * 2.6}s`;
        el.style.animationDuration = `${2.2 + Math.random() * 2.8}s`;
        wrapper.appendChild(el);
      }
      return wrapper;
    }

    function markClickedBottle(id) {
      const target = document.querySelector(`.bottle-card[data-id="${id}"]`);
      if (!target) return;
      target.classList.remove('clicked');
      void target.offsetWidth;
      target.classList.add('clicked');
      setTimeout(() => target.classList.remove('clicked'), 1000);
    }

    function renderWheel() {
      const wheel = document.getElementById('wheel');
      wheel.innerHTML = '';
      bottleConfigs.forEach(config => {
        const btn = document.createElement('button');
        btn.className = 'bottle-card';
        btn.dataset.id = config.id;
        btn.dataset.pos = config.pos;
        if (config.id === activeBottleId) btn.classList.add('active');
        else if (activeBottleId) btn.classList.add('dimmed');
        btn.innerHTML = `
          <div class="bottle">
            <div class="bottle-neck"></div>
            <div class="bottle-body">
              <div class="bottle-name">${config.name}</div>
              <div class="bottle-line">${config.line}</div>
              <div class="label-chip">${config.short}</div>
            </div>
          </div>
        `;
        btn.querySelector('.bottle-body').appendChild(createDeco(config.deco));
        btn.addEventListener('click', () => selectBottle(config.id, { animate: true }));
        wheel.appendChild(btn);
      });
    }

    function openNewMoment(resetInput = true) {
      currentMomentSeed = Date.now();
      document.getElementById('composerTimeChip').textContent = `时间戳：${fmt(currentMomentSeed)}`;
      document.getElementById('sessionTime').textContent = `这一刻的时间：${fmt(currentMomentSeed)}`;
      if (resetInput) mainInput.value = '';
      document.getElementById('saveState').textContent = '这一刻正安静展开';
      updateSaveButtonState();
    }

    function refreshEditorPanel() {
      const panel = document.getElementById('editorPanel');
      panel.classList.remove('refreshing');
      void panel.offsetWidth;
      panel.classList.add('refreshing');
      setTimeout(() => panel.classList.remove('refreshing'), 750);
    }

    function selectBottle(id, options = {}) {
      const { animate = false } = options;
      activeBottleId = id;
      setTheme(id);
      renderWheel();
      const config = getBottleConfig(id);
      document.getElementById('editorTitle').textContent = config.name;
      document.getElementById('editorDesc').textContent = config.desc;
      mainInput.placeholder = config.placeholder;
      document.getElementById('timelineTitle').textContent = `${config.name} · 瓶中留言`;
      document.getElementById('composerLabel').textContent = `写给「${config.name}」的这一刻`;
      document.getElementById('statusTitle').textContent = `当前瓶子：${config.name}`;
      openNewMoment(true);
      subscribeActiveBottle();
      renderTimeline();
      refreshEditorPanel();
      if (animate) {
        markClickedBottle(id);
        triggerScene(id);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/\n/g, '<br>');
    }

    function updateAuthUI() {
      if (currentUser) {
        authUserLine.innerHTML = `<strong>已登录：</strong>${currentUser.email}`;
        authTip.textContent = '当前只会读取这个账号自己的云端记录。';
        logoutBtn.classList.remove('hidden');
      } else {
        authUserLine.textContent = '未登录。注册或登录后，你只会看到自己的瓶中记录。';
        authTip.textContent = '同一个账号在不同设备登录后，会看到同一份云端记录。';
        logoutBtn.classList.add('hidden');
      }
      updateSaveButtonState();
    }

    function setInfo(message) {
      document.getElementById('saveState').textContent = message;
    }

    function updateSaveButtonState() {
      const canSave = !!currentUser && !!mainInput.value.trim();
      saveMomentBtn.disabled = !canSave;
      saveMomentBtn.style.opacity = canSave ? '1' : '.6';
    }

    function subscribeActiveBottle() {
      if (unsubscribePosts) {
        unsubscribePosts();
        unsubscribePosts = null;
      }
      currentPosts = [];
      if (!currentUser) {
        renderTimeline();
        return;
      }
      const q = query(currentBottleCollection(), orderBy('createdAtMs', 'desc'));
      unsubscribePosts = onSnapshot(q, (snapshot) => {
        currentPosts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTimeline();
      }, (error) => {
        console.error(error);
        setInfo('云端同步暂时不可用');
      });
    }

    async function saveCurrentMoment() {
      const content = mainInput.value.trim();
      if (!currentUser) {
        setInfo('先登录，再把这一刻存入瓶子里');
        return;
      }
      if (!content) {
        setInfo('先写一点东西，再轻轻存进去');
        return;
      }
      saveMomentBtn.disabled = true;
      setInfo('正在把这一刻存入瓶子里…');
      try {
        await addDoc(currentBottleCollection(), {
          bottleId: activeBottleId,
          content,
          createdAt: serverTimestamp(),
          createdAtMs: currentMomentSeed,
          updatedAtMs: Date.now(),
          replies: []
        });
        setInfo('已经落进这个瓶子里了');
        openNewMoment(true);
      } catch (error) {
        console.error(error);
        setInfo('存入失败，请稍后再试');
      } finally {
        updateSaveButtonState();
      }
    }

    async function addReply(postId) {
      if (!currentUser) {
        setInfo('先登录，再留下这层回声');
        return;
      }
      const content = (replyDrafts[postId] || '').trim();
      if (!content) return;
      const post = currentPosts.find(item => item.id === postId);
      if (!post) return;
      const nextReplies = [...(post.replies || []), {
        id: uid('reply'),
        createdAtMs: Date.now(),
        content
      }];
      try {
        await updateDoc(doc(db, `users/${currentUser.uid}/bottles/${activeBottleId}/posts/${postId}`), {
          replies: nextReplies,
          updatedAtMs: Date.now()
        });
        replyDrafts[postId] = '';
        renderTimeline();
      } catch (error) {
        console.error(error);
        setInfo('这层回声没有落稳，请再试一次');
      }
    }

    function toggleReplyBox(postId) {
      const box = document.querySelector(`[data-replybox="${postId}"]`);
      if (!box) return;
      box.hidden = !box.hidden;
      if (!box.hidden) {
        const textarea = box.querySelector('.reply-input');
        if (textarea) textarea.focus();
      }
    }

    async function deletePost(postId) {
      const ok = confirm('确定删除这条留言吗？它的补充与评论也会一起删除。');
      if (!ok || !currentUser) return;
      try {
        await deleteDoc(doc(db, `users/${currentUser.uid}/bottles/${activeBottleId}/posts/${postId}`));
      } catch (error) {
        console.error(error);
        setInfo('删除失败，请稍后再试');
      }
    }

    function renderTimeline() {
      const list = document.getElementById('timelineList');
      const posts = [...currentPosts].sort((a, b) => (b.createdAtMs || 0) - (a.createdAtMs || 0));
      document.getElementById('countPill').textContent = `${posts.length} 条记录`;
      if (!currentUser) {
        list.innerHTML = '<div class="empty-state">先注册或登录。<br>登录后只会看到你自己的云端记录。</div>';
        return;
      }
      if (!posts.length) {
        list.innerHTML = '<div class="empty-state">这个瓶子还是空的。<br>编辑完成后，点一下“存入瓶子”。</div>';
        return;
      }

      list.innerHTML = '';
      posts.forEach(post => {
        const card = document.createElement('article');
        card.className = 'note-card';

        const meta = document.createElement('div');
        meta.className = 'note-meta';
        meta.innerHTML = `
          <span class="note-time">记录于 ${fmt(post.createdAtMs)}</span>
          <div class="btn-group">
            <button class="toggle-link" data-action="reply">补充 / 评论</button>
            <button class="toggle-link" data-action="delete">删除</button>
          </div>
        `;

        const content = document.createElement('div');
        content.className = 'note-content';
        content.innerHTML = escapeHtml(post.content || '');

        const repliesWrap = document.createElement('div');
        repliesWrap.className = 'replies';
        (post.replies || []).forEach(reply => {
          const div = document.createElement('div');
          div.className = 'reply-item';
          div.innerHTML = `
            <span class="reply-time">${fmt(reply.createdAtMs)}</span>
            <div class="reply-content">${escapeHtml(reply.content)}</div>
          `;
          repliesWrap.appendChild(div);
        });

        const replyBox = document.createElement('div');
        replyBox.className = 'reply-box';
        replyBox.dataset.replybox = post.id;
        replyBox.hidden = true;

        const replyInput = document.createElement('textarea');
        replyInput.className = 'reply-input';
        replyInput.placeholder = '沿着现在的时间，再补一句、再回应一句……';
        replyInput.value = replyDrafts[post.id] || '';

        const replyActions = document.createElement('div');
        replyActions.className = 'reply-actions';
        replyActions.innerHTML = `
          <div class="tips">把这条回声，轻轻留在这则留言下面。</div>
          <div class="btn-group">
            <button class="btn secondary" data-action="collapse">收起</button>
            <button class="btn primary" data-action="send-reply">留下回声</button>
          </div>
        `;

        replyInput.addEventListener('input', (e) => {
          clearTimeout(replyTimer);
          const value = e.target.value;
          replyTimer = setTimeout(() => { replyDrafts[post.id] = value; }, 120);
        });

        replyBox.appendChild(replyInput);
        replyBox.appendChild(replyActions);

        card.appendChild(meta);
        card.appendChild(content);
        card.appendChild(repliesWrap);
        card.appendChild(replyBox);

        card.querySelector('[data-action="reply"]').addEventListener('click', () => toggleReplyBox(post.id));
        card.querySelector('[data-action="delete"]').addEventListener('click', () => deletePost(post.id));
        card.querySelector('[data-action="collapse"]').addEventListener('click', () => toggleReplyBox(post.id));
        card.querySelector('[data-action="send-reply"]').addEventListener('click', () => addReply(post.id));
        list.appendChild(card);
      });
    }

    function clearScene() {
      const fx = document.getElementById('sceneFx');
      fx.innerHTML = '';
      document.body.classList.remove('scene-joy', 'scene-rainy', 'scene-ideas', 'scene-ordinary');
      if (sceneTimer) clearTimeout(sceneTimer);
    }

    function appendSceneItem(className, styleMap = {}) {
      const item = document.createElement('span');
      item.className = `scene-item ${className}`;
      Object.entries(styleMap).forEach(([key, value]) => item.style.setProperty(key, value));
      document.getElementById('sceneFx').appendChild(item);
      return item;
    }

    function triggerJoyScene() {
      document.body.classList.add('scene-joy');
      for (let i = 0; i < 34; i++) {
        const size = 10 + Math.random() * 36;
        appendSceneItem('scene-bubble', {
          left: `${6 + Math.random() * 88}vw`,
          top: `${60 + Math.random() * 28}vh`,
          width: `${size}px`,
          height: `${size}px`,
          '--dx': `${-48 + Math.random() * 96}px`,
          '--dy': `${-250 - Math.random() * 280}px`,
          '--dur': `${3.6 + Math.random() * 1.6}s`,
          'animation-delay': `${Math.random() * 0.45}s`
        });
      }
    }

    function triggerRainyScene() {
      document.body.classList.add('scene-rainy');
      for (let i = 0; i < 110; i++) {
        const height = 28 + Math.random() * 60;
        appendSceneItem('scene-rain', {
          left: `${Math.random() * 100}vw`,
          top: `${-12 - Math.random() * 18}vh`,
          height: `${height}px`,
          opacity: `${0.24 + Math.random() * 0.36}`,
          '--drift': `${-16 + Math.random() * 28}px`,
          '--dur': `${3.1 + Math.random() * 1.4}s`,
          'animation-delay': `${Math.random() * 0.7}s`
        });
      }
      for (let i = 0; i < 3; i++) {
        appendSceneItem('scene-rain-mist', {
          left: `${-2 + i * 28 + Math.random() * 8}vw`,
          top: `${-4 + Math.random() * 5}vh`,
          'animation-delay': `${i * 0.22}s`
        });
      }
      for (let i = 0; i < 11; i++) {
        const size = 54 + Math.random() * 94;
        appendSceneItem('scene-ripple', {
          left: `${8 + Math.random() * 84}vw`,
          top: `${72 + Math.random() * 18}vh`,
          width: `${size}px`,
          height: `${size * 0.4}px`,
          'animation-delay': `${0.55 + Math.random() * 1.35}s`
        });
      }
    }

    function triggerIdeasScene() {
      document.body.classList.add('scene-ideas');
      for (let i = 0; i < 26; i++) {
        const size = 16 + Math.random() * 48;
        appendSceneItem('scene-idea-orb', {
          left: `${22 + Math.random() * 56}vw`,
          top: `${14 + Math.random() * 60}vh`,
          width: `${size}px`,
          height: `${size}px`,
          '--dx': `${-190 + Math.random() * 380}px`,
          '--dy': `${-145 + Math.random() * 290}px`,
          '--dur': `${2.8 + Math.random() * 1.4}s`,
          'animation-delay': `${Math.random() * 0.32}s`
        });
      }
      for (let i = 0; i < 18; i++) {
        appendSceneItem('scene-idea-line', {
          left: `${18 + Math.random() * 60}vw`,
          top: `${18 + Math.random() * 58}vh`,
          width: `${90 + Math.random() * 140}px`,
          '--r': `${-70 + Math.random() * 140}deg`,
          'animation-delay': `${Math.random() * 0.45}s`
        });
      }
      for (let i = 0; i < 6; i++) {
        const size = 100 + Math.random() * 180;
        appendSceneItem('scene-idea-ring', {
          left: `${30 + Math.random() * 34}vw`,
          top: `${22 + Math.random() * 34}vh`,
          width: `${size}px`,
          height: `${size}px`,
          '--rot': `${120 + Math.random() * 180}deg`,
          'animation-delay': `${Math.random() * 0.3}s`
        });
      }
    }

    function triggerOrdinaryScene() {
      document.body.classList.add('scene-ordinary');
      for (let i = 0; i < 18; i++) {
        appendSceneItem('scene-breeze-line', {
          left: `${-18 - Math.random() * 10}vw`,
          top: `${14 + Math.random() * 70}vh`,
          width: `${130 + Math.random() * 210}px`,
          '--dur': `${3.1 + Math.random() * 1.5}s`,
          'animation-delay': `${Math.random() * 0.55}s`
        });
      }
      for (let i = 0; i < 14; i++) {
        appendSceneItem('scene-leaf', {
          left: `${-12 - Math.random() * 8}vw`,
          top: `${18 + Math.random() * 62}vh`,
          '--dy': `${-26 + Math.random() * 54}px`,
          '--rot': `${200 + Math.random() * 380}deg`,
          '--dur': `${3.7 + Math.random() * 1.5}s`,
          'animation-delay': `${0.12 + Math.random() * 0.8}s`
        });
      }
    }

    function triggerScene(id) {
      clearScene();
      if (window.innerWidth <= 820) return;
      if (id === 'joy') triggerJoyScene();
      if (id === 'rainy') triggerRainyScene();
      if (id === 'ideas') triggerIdeasScene();
      if (id === 'ordinary') triggerOrdinaryScene();
      sceneTimer = setTimeout(() => clearScene(), 5200);
    }

    async function registerWithEmail() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        setInfo('先填写邮箱和密码');
        return;
      }
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        setInfo('注册成功，可以开始把心绪存进瓶子里了');
      } catch (error) {
        console.error(error);
        setInfo(error.message.includes('email-already') ? '这个邮箱已经注册过了，直接登录就好' : '注册失败，请检查邮箱和密码');
      }
    }

    async function loginWithEmail() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        setInfo('先填写邮箱和密码');
        return;
      }
      try {
        await signInWithEmailAndPassword(auth, email, password);
        setInfo('欢迎回来，这个瓶子会继续记住你');
      } catch (error) {
        console.error(error);
        setInfo('登录失败，请确认邮箱和密码');
      }
    }

    async function logoutCurrentUser() {
      try {
        await signOut(auth);
        setInfo('已经退出登录');
      } catch (error) {
        console.error(error);
      }
    }

    mainInput.addEventListener('input', () => {
      document.getElementById('saveState').textContent = '正在编辑这一刻，确认后再存入瓶子';
      updateSaveButtonState();
    });

    newMomentBtn.addEventListener('click', () => {
      openNewMoment(true);
      mainInput.focus();
    });

    saveMomentBtn.addEventListener('click', saveCurrentMoment);
    registerBtn.addEventListener('click', registerWithEmail);
    loginBtn.addEventListener('click', loginWithEmail);
    logoutBtn.addEventListener('click', logoutCurrentUser);

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      updateAuthUI();
      subscribeActiveBottle();
      renderTimeline();
    });

    renderWheel();
    selectBottle(activeBottleId, { animate: false });
  </script>

</body>
</html>
